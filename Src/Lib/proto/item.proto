syntax = "proto3";

package SkillBridge.Message;

option csharp_namespace = "SkillBridge.Message";
option cc_enable_arenas = true;

import "common.proto";

enum StatusType
{
	MONEY = 0;
	EXP = 1;
	LEVEL = 2;
	SKILL_POINT = 3;
	ITEM = 4;
}

enum StatusAction
{
	STATUS_ACTION_UPDATE = 0;
	STATUS_ACTION_ADD = 1;
	STATUS_ACTION_DELETE = 2;
}

enum EquipSlot
{
	WEAPON = 0;
	ACCESSORY = 1;
	HELMET = 2;
	CHEST = 3;
	SHOULDER = 4;
	PANTS = 5;
	BOOTS = 6;
	SLOT_MAX = 7;
}

enum ItemType
{
	NORMAL = 0;
	MATERIAL = 1;
	TASK = 2;
	EQUIP = 3;
	ITEM_TYPE_RIDE = 4;
}
message NBagInfo
{
	int32 Unlocked = 1;
	bytes Items = 2;
}
message NItemInfo
{
	int32 id = 1;
	int32 count = 2;
}
message NStatus
{
	StatusAction action = 1;
	StatusType type = 2;
	int32 id = 3;
	int32 value = 4;
}

message StatusNotify
{
	repeated NStatus status = 1;
}
message ItemBuyRequest
{
	int32 shopId = 1;
	int32 shopItemId = 2;
}

message ItemBuyResponse
{
	Result result = 1;
	string errormsg = 2;
}

// Bag Protocol
message BagSaveRequest
{
	NBagInfo bag = 1;
}

message BagSaveResponse
{
	Result result = 1;
	string errormsg = 2;
}

message ItemEquipResponse
{
	Result result = 1;
	string errormsg = 2;
}
message ItemEquipRequest
{
	int32 itemId = 1;
	int32 slot = 2;
	bool isEquip = 3;
}
