syntax = "proto3";

package SkillBridge.Message;

option csharp_namespace = "SkillBridge.Message";
option cc_enable_arenas = true;

////////////////////////////////////////////////////////////////
//
//  Basic Defines
//
////////////////////////////////////////////////////////////////
enum RESULT
{
	SUCCESS = 0;
	FAILED = 1;
}

enum CHARACTER_TYPE
{
	Player = 0;
	NPC = 1;
	Monster = 2;
}

enum CHARACTER_CLASS
{
	NONE = 0;
	WARRIOR = 1;
	WIZARD = 2;
	ARCHER = 3;
}

enum CHARACTER_STATE
{
	IDLE = 0;
	MOVE = 1;
}

enum ENTITY_EVENT
{
	NONE = 0;
	IDLE = 1;
	MOVE_FWD = 2;
	MOVE_BACK = 3;
	JUMP = 4;
	RIDE = 5;
}

enum Item_Type
{
	NORMAL = 0;
	MATERIAL = 1;
	TASK = 2;
	EQUIP = 3;
	RIDE = 4;
}

enum EQUIP_SLOT
{
	WEAPON = 0;
	ACCESSORY = 1;
	HELMET = 2;
	CHEST = 3;
	SHOULDER = 4;
	PANTS = 5;
	BOOTS = 6;
	SLOT_MAX = 7;
}

message NUserInfo {
	int32 id = 1;
	NPlayerInfo player = 2;
}

message NPlayerInfo {
	int32 id = 1;
	repeated NCharacterInfo characters = 2;
}

message NCharacterInfo {
	int32 id = 1;//db ID
	int32 config_id = 2;//config id
	int32 entity_id = 3;//entity id
	string name = 4;
	CHARACTER_TYPE type = 5;
	CHARACTER_CLASS class = 6;
	int32 level = 7;
	int32 exp = 8;
	NAttributeDynamic dynamic = 9;
	int32 mapId = 10;
	NEntity entity = 11;
	int64 gold = 12;
	repeated NItemInfo items = 13;
	NBagInfo bag = 14;
	bytes Equips = 15;
	repeated NQuestInfo quests = 16;
	repeated NFriendInfo friends = 17;
	NGuildInfo guild = 18;
	int32 ride = 19;
	repeated NSkillInfo skills = 20;
}

message NAttributeDynamic {
	int32 HP = 1;
	int32 MP = 2;
}

message NItemInfo
{
	int32 id = 1;
	int32 count = 2;
}

message NSkillInfo
{
	int32 id = 1;
	int32 level = 2;
}

message NBagInfo
{
	int32 Unlocked = 1;
	bytes Items = 2;
}

message NVector3
{
	int32 x = 1;
	int32 y = 2;
	int32 z = 3;
}

enum STATUS_TYPE
{
	MONEY = 0;
	EXP = 1;
	LEVEL = 2;
	SKILL_POINT = 3;
	ITEM = 4;
}

enum STATUS_ACTION
{
	UPDATE = 0;
	ADD = 1;
	DELETE = 2;
}

/*enum STATUS_SOURCE
{
	UPDATE = 0;
	ADD = 1;
	DELETE = 2;
}*/

message NStatus
{
	STATUS_ACTION action = 1;
	STATUS_TYPE type = 2;
	int32 id = 3;
	int32 value = 4;
}

message StatusNotify
{
	repeated NStatus status = 1;
}

////////////////////////////////////////////////////////////////
//
//  Entities
//
////////////////////////////////////////////////////////////////


message NEntity {
	int32 id = 1;
	NVector3 position = 2;
	NVector3 direction = 3;
	int32 speed = 4;
}

message NEntitySync {
	int32 id = 1;
	ENTITY_EVENT event = 2;
	NEntity entity = 3;
	int32 param = 4;
}



////////////////////////////////////////////////////////////////
//
//  Messages
//
////////////////////////////////////////////////////////////////

message NetMessage{
	NetMessageRequest Request = 1;
	NetMessageResponse Response = 2;
}

message NetMessageRequest{
	UserRegisterRequest userRegister = 1;
	UserLoginRequest userLogin = 2;
	UserCreateCharacterRequest createChar = 3;
	UserGameEnterRequest gameEnter = 4;
	UserGameLeaveRequest gameLeave = 5;
	
	MapCharacterEnterRequest mapCharacterEnter = 6;

	MapEntitySyncRequest mapEntitySync = 8;
	MapTeleportRequest mapTeleport = 9;

	ItemBuyRequest itemBuy = 10;
	ItemEquipRequest itemEquip = 11;

	QuestListRequest questList = 12;
	QuestAcceptRequest questAccept = 13;

	BagSaveRequest bagSave = 14;
	QuestSubmitRequest questSubmit = 15;

	//即有响应，又有请求是为了做双向交互，意味着客户端和服务端都要处理请求和相应
	FriendAddRequest friendAddReq = 16;
	FriendAddResponse friendAddRes = 17;
	FriendListRequest friendList = 18;
	FriendRemoveRequest friendRemove = 19;

	TeamInviteRequest teamInviteReq = 20;
	TeamInviteResponse teamInviteRes = 21;
	TeamInfoRequest teamInfo = 22;
	TeamLeaveRequest teamLeave = 23;

	GuildCreateRequest guildCreate = 24;
	GuildJoinRequest guildJoinReq = 25;
	GuildJoinResponse guildJoinRes = 26;
	GuildRequest guild = 27;
	GuildLeaveRequest guildLeave = 28;
	GuildListRequest guildList = 29;
	GuildAdminRequest guildAdmin = 30;

	ChatRequest chat = 31;

	SkillCastRequest skillCast = 50;
}

message NetMessageResponse{
	UserRegisterResponse userRegister = 1;
	UserLoginResponse userLogin = 2;
	UserCreateCharacterResponse createChar = 3;
	UserGameEnterResponse gameEnter = 4;
	UserGameLeaveResponse gameLeave = 5;

	MapCharacterEnterResponse mapCharacterEnter = 6;
	MapCharacterLeaveResponse mapCharacterLeave = 7;

	MapEntitySyncResponse mapEntitySync = 8;

	ItemBuyResponse itemBuy = 10;
	ItemEquipResponse itemEquip = 11;
	
	QuestListResponse questList = 12;
	QuestAcceptResponse questAccept = 13;

	BagSaveRequest bagSave = 14;
	QuestSubmitResponse questSubmit = 15;

	FriendAddRequest friendAddReq = 16;
	FriendAddResponse friendAddRes = 17;
	FriendListResponse friendList = 18;
	FriendRemoveResponse friendRemove = 19;

	TeamInviteRequest teamInviteReq = 20;
	TeamInviteResponse teamInviteRes = 21;
	TeamInfoResponse teamInfo = 22;
	TeamLeaveResponse teamLeave = 23;

	GuildCreateResponse guildCreate = 24;
	GuildJoinRequest guildJoinReq = 25;
	GuildJoinResponse guildJoinRes = 26;
	GuildResponse guild = 27;
	GuildLeaveResponse guildLeave = 28;
	GuildListResponse guildList = 29;
	GuildAdminResponse guildAdmin = 30;

	ChatResponse chat = 31;

	SkillCastResponse skillCast = 50;

	StatusNotify statusNotify = 100;
}


// User Protocol
message UserLoginRequest {
	string user = 1;
	string passward = 2;
}

message UserLoginResponse {
	RESULT result = 1;
	string errormsg = 2;
	NUserInfo userinfo = 3;
}


message UserRegisterRequest
{
	string user = 1;
	string passward = 2;
}

message UserRegisterResponse {
	RESULT result = 1;
	string errormsg = 2;
}

message UserCreateCharacterRequest
{
	string name = 1;
	CHARACTER_CLASS class = 2;
}

message UserCreateCharacterResponse {
	RESULT result = 1;
	string errormsg = 2;
	repeated NCharacterInfo characters = 3;
}

message UserGameEnterRequest
{
	int32 characterIdx = 1;
}

message UserGameEnterResponse {
	RESULT result = 1;
	string errormsg = 2;
	NCharacterInfo character = 3;
}

message UserGameLeaveRequest
{
}

message UserGameLeaveResponse {
	RESULT result = 1;
	string errormsg = 2;
}

// Map Protocol
message MapCharacterEnterRequest
{
	int32 mapId = 1;
}

message MapCharacterEnterResponse
{
	int32 mapId = 1;
	repeated NCharacterInfo characters = 2;
}

message MapCharacterLeaveResponse
{
	int32 entityId = 1;
}


message MapEntitySyncRequest
{
    NEntitySync entitySync = 1;
}


message MapEntitySyncResponse
{
    repeated NEntitySync entitySyncs = 2;
}

message MapTeleportRequest
{
	int32 teleporterId = 1;
}

message ItemBuyRequest
{
	int32 shopId = 1;
	int32 shopItemId = 2;
}

message ItemBuyResponse
{
	RESULT result = 1;
	string errormsg = 2;
}

// Bag Protocol
message BagSaveRequest
{
	NBagInfo bag = 1;
}

message BagSaveResponse
{
	RESULT result = 1;
	string errormsg = 2;
}

message ItemEquipResponse
{
	RESULT result = 1;
	string errormsg = 2;
}
message ItemEquipRequest
{
	int32 itemId = 1;
	int32 slot = 2;
	bool isEquip = 3;
}

// Quest System
enum QUEST_STATUS
{
	IN_PROGRESS = 0;//已接受，未完成
	COMPLETED = 1;//已完成，未提交
	FINISHED = 2;//已完成，已提交
	FAILED = 3;//已失败
}

enum QUEST_LIST_TYPE
{
	ALL = 0;
	IN_PROGRESS = 1;
	FINISHED = 2;
}

message NQuestInfo
{
	int32 quest_id = 1;
	int32 quest_guid = 2;
	QUEST_STATUS status = 3;
	repeated int32 targets = 4;
}

message QuestListRequest
{
	QUEST_LIST_TYPE listType = 1;
}

message QuestListResponse
{
	RESULT result = 1;
	string errormsg = 2;
	repeated NQuestInfo quests = 3;
}

message QuestAcceptRequest
{
	int32 quest_id = 1;
}

message QuestAcceptResponse
{
	RESULT result = 1;
	string errormsg = 2;
	NQuestInfo quest = 3;
}

message QuestSubmitRequest
{
	int32 quest_id = 1;
}

message QuestSubmitResponse
{
	RESULT result = 1;
	string errormsg = 2;
	NQuestInfo quest = 3;
}

message QuestAbandonRequest
{
	int32 quest_id = 1;
}

message QuestAbandonResponse
{
	RESULT result = 1;
	string errormsg = 2;
}

// Friend System
message NFriendInfo
{
	int32 id = 1;
	NCharacterInfo friendInfo = 2;
	int32 status = 3;
}

message FriendAddRequest
{
	int32 from_id = 1;
	string from_name = 2;
	int32 to_id = 3;
	string to_name = 4;
}

message FriendAddResponse
{
	RESULT result = 1;
	string errormsg = 2;
	FriendAddRequest request = 3;//保存请求信息
}

message FriendListRequest
{

}

message FriendListResponse
{
	RESULT result = 1;
	string errormsg = 2;
	repeated NFriendInfo friends = 3;
}

message FriendRemoveRequest
{
	int32 id = 1;
	int32 friendId = 2;
}

message FriendRemoveResponse
{
	RESULT result = 1;
	string errormsg = 2;
	int32 id = 3;
}

// Team System
message NTeamInfo
{
	int32 id = 1;
	int32 leader = 2;
	repeated NCharacterInfo members = 3;
}

message TeamInviteRequest
{
	int32 team_id = 1;
	int32 from_id = 2;
	string from_name = 3;
	int32 to_id = 4;
	string to_name = 5;
}

message TeamInviteResponse
{
	RESULT result = 1;
	string errormsg = 2;
	TeamInviteRequest request = 3;
}

message TeamInfoRequest
{

}

message TeamInfoResponse
{
	RESULT result = 1;
	string errormsg = 2;
	NTeamInfo team = 3;
}

message TeamLeaveRequest
{
	int32 team_id = 1;
	int32 characterId = 2;
}

message TeamLeaveResponse
{
	RESULT result = 1;
	string errormsg = 2;
	int32 characterId = 3;
}

/////////////////////////////
//Guild System
/////////////////////////////
enum GUILD_TITLE
{
	NONE = 0;
	PRESIDENT = 1;
	VICE_PRESIDENT = 2;
}

enum APPLY_RESULT
{
	NONE = 0;
	ACCEPT = 1;
	REJECT = 2;
}

message NGuildInfo
{
	int32 id = 1;
	string guild_name = 2;
	int32 leaderId = 3;
	string leaderName = 4;
	string notice = 5;
	int32 memberCount = 6;
	repeated NGuildMemberInfo members = 7;//成员列表
	repeated NGuildApplyInfo applies = 8;//申请列表
	int64 createTime = 9;
}

message NGuildMemberInfo
{
	int32 id = 1;
	int32 characterId = 2;//角色id
	GUILD_TITLE title = 3;//职位
	NCharacterInfo info = 4;//角色信息
	int64 joinTime = 5;//加入时间
	int64 lastTime = 6;//最后一次在线时间
	int32 status = 7;//状态
}

message NGuildApplyInfo
{
	int32 guild_id = 1;
	int32 characterId = 2;
	string name = 3;
	int32 class = 4;
	int32 level = 5;
	APPLY_RESULT result = 6;
}

message GuildCreateRequest
{
	string guild_name = 1;
	string guild_notice = 2;
}

message GuildCreateResponse
{
	RESULT result = 1;
	string errormsg = 2;
	NGuildInfo guildInfo = 3;
}

message GuildJoinRequest
{
	NGuildApplyInfo apply = 1;
}

//[member -> server -> leader]
message GuildJoinResponse
{
	RESULT result = 1;
	string errormsg = 2;
	NGuildApplyInfo apply = 3;
}

//请求所有公会信息
message GuildListRequest
{
	
}

message GuildListResponse
{
	RESULT result = 1;
	string errormsg = 2;
	repeated NGuildInfo guilds = 3;
}

//请求单个公会信息
message GuildRequest
{

}

message GuildResponse
{
	RESULT result = 1;
	string errormsg = 2;
	NGuildInfo guildInfo = 3;
}

message GuildLeaveRequest
{

}

message GuildLeaveResponse
{
	RESULT result = 1;
	string errormsg = 2;
}

//公会管理
enum GUILD_ADMIN_COMMAND
{
	KICKOUT = 0;//踢人
	PROMOTE = 1;//晋升
	DEPOST = 2;//罢免
	TRANSFER = 3;//转让会长
}

message GuildAdminRequest
{
	GUILD_ADMIN_COMMAND command = 1;
	int32 tatget = 2;
}

message GuildAdminResponse
{
	RESULT result = 1;
	string errormsg = 2;
	GuildAdminRequest command = 3;
}

/////////////////////////////
//聊天
/////////////////////////////
enum CHAT_CHANNEL
{//使用2的n次方来指定枚举值，方便使用位运算来画定综合频道，也是为了方便日后拓展
	ALL = -1;
	LOCAL = 1;
	WORLD = 2;
	SYSTEM = 4;
	PRIVATE = 8;
	TEAM = 16;
	GUILD = 32;
}

message ChatMessage
{
	CHAT_CHANNEL channel = 1;
	int32 id = 2;
	int32 from_id = 3;
	string from_name = 4;
	int32 to_id = 5;
	string to_name = 6;
	string message = 7;
	double time = 8;
}

message ChatRequest
{
	ChatMessage message = 1;
}

message ChatResponse
{
	RESULT result = 1;
	string errormsg = 2;
	repeated ChatMessage localMessages = 3;
	repeated ChatMessage worldMessages = 4;
	repeated ChatMessage systemMessages = 5;
 	repeated ChatMessage privateMessages = 6;
	repeated ChatMessage teamMessages = 7;
	repeated ChatMessage guildMessages = 8;
}

/////////////////////////////
//战斗
/////////////////////////////

enum SKILL_RESULT
{
	OK = 0;
	OUT_OF_MP = 1;
	COOL_DOWN = 2;
	INVALID_TARGET = 3;
}

message NSkillCastInfo
{
	int32 skillId = 1;
	int32 casterId = 2;
	int32 targetId = 3;
	NVector3 position = 4;
}

message SkillCastRequest
{
	NSkillCastInfo castInfo = 1;
}

message SkillCastResponse
{
	RESULT result = 1;
	string errormsg = 2;
	NSkillCastInfo castInfo = 3;
}