syntax = "proto3";

package SkillBridge.Message;

option csharp_namespace = "SkillBridge.Message";
option cc_enable_arenas = true;

import "common.proto";

enum QuestStatus
{
	QUEST_IN_PROGRESS = 0;
	QUEST_COMPLETED = 1;
	QUEST_FINISHED = 2;
	QUEST_FAILED = 3;
}

enum QuestListType
{
	QUEST_LIST_ALL = 0;
	QUEST_IN_PROGRESS_TYPE = 1;
	QUEST_FINISHED_TYPE = 2;
}

message NQuestInfo
{
	int32 quest_id = 1;
	int32 quest_guid = 2;
	QuestStatus status = 3;
	repeated int32 targets = 4;
}

message QuestListRequest
{
	QuestListType listType = 1;
}

message QuestListResponse
{
	Result result = 1;
	string errormsg = 2;
	repeated NQuestInfo quests = 3;
}

message QuestAcceptRequest
{
	int32 quest_id = 1;
}

message QuestAcceptResponse
{
	Result result = 1;
	string errormsg = 2;
	NQuestInfo quest = 3;
}

message QuestSubmitRequest
{
	int32 quest_id = 1;
}

message QuestSubmitResponse
{
	Result result = 1;
	string errormsg = 2;
	NQuestInfo quest = 3;
}

message QuestAbandonRequest
{
	int32 quest_id = 1;
}

message QuestAbandonResponse
{
	Result result = 1;
	string errormsg = 2;
}