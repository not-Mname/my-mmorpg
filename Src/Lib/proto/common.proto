syntax = "proto3";

package SkillBridge.Message;

option csharp_namespace = "SkillBridge.Message";
option cc_enable_arenas = true;

////////////////////////////////////////////////////////////////
//
//  Basic Defines
//
////////////////////////////////////////////////////////////////
enum Result
{
	SUCCESS = 0;
	FAILED = 1;
}

////////////////////////////////////////////////////////////////
//
//  Base Messages
//
////////////////////////////////////////////////////////////////

message NVector3
{
	int32 x = 1;
	int32 y = 2;
	int32 z = 3;
}