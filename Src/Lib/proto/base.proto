syntax = "proto3";

package SkillBridge.Message;

option csharp_namespace = "SkillBridge.Message";
option cc_enable_arenas = true;

////////////////////////////////////////////////////////////////
//
//  Basic Defines
//
////////////////////////////////////////////////////////////////
enum Result
{
	SUCCESS = 0;
	FAILED = 1;
}

enum CharacterType
{
	Player = 0;
	NPC = 1;
	Monster = 2;
}

enum CharacterClass
{
	NONE = 0;
	WARRIOR = 1;
	WIZARD = 2;
	ARCHER = 3;
}

enum CharacterState
{
	CHARACTER_STATE_IDLE = 0;
	CHARACTER_STATE_MOVE = 1;
}

enum EntityEvent
{
	ENTITY_EVENT_NONE = 0;
	ENTITY_EVENT_IDLE = 1;
	MOVE_FWD = 2;
	MOVE_BACK = 3;
	JUMP = 4;
	RIDE = 5;
}

enum ItemType
{
	NORMAL = 0;
	MATERIAL = 1;
	TASK = 2;
	EQUIP = 3;
	ITEM_TYPE_RIDE = 4;
}

enum EquipSlot
{
	WEAPON = 0;
	ACCESSORY = 1;
	HELMET = 2;
	CHEST = 3;
	SHOULDER = 4;
	PANTS = 5;
	BOOTS = 6;
	SLOT_MAX = 7;
}

enum StatusType
{
	MONEY = 0;
	EXP = 1;
	LEVEL = 2;
	SKILL_POINT = 3;
	ITEM = 4;
}

enum StatusAction
{
	STATUS_ACTION_UPDATE = 0;
	STATUS_ACTION_ADD = 1;
	STATUS_ACTION_DELETE = 2;
}

enum QuestStatus
{
	QUEST_IN_PROGRESS = 0;
	QUEST_COMPLETED = 1;
	QUEST_FINISHED = 2;
	QUEST_FAILED = 3;
}

enum QuestListType
{
	QUEST_LIST_ALL = 0;
	QUEST_IN_PROGRESS_TYPE = 1;
	QUEST_FINISHED_TYPE = 2;
}

enum GuildTitle
{
	GUILD_TITLE_NONE = 0;
	PRESIDENT = 1;
	VICE_PRESIDENT = 2;
}

enum ApplyResult
{
	APPLY_RESULT_NONE = 0;
	ACCEPT = 1;
	REJECT = 2;
}

enum GuildAdminCommand
{
	KICKOUT = 0;
	PROMOTE = 1;
	DEPOST = 2;
	TRANSFER = 3;
}

enum ChatChannel
{
	CHAT_CHANNEL_ALL = 0;
	LOCAL = 1;
	WORLD = 2;
	SYSTEM = 4;
	PRIVATE = 8;
	TEAM = 16;
	GUILD = 32;
}

enum SkillResult
{
	OK = 0;
	OUT_OF_MP = 1;
	COOL_DOWN = 2;
	INVALID_TARGET = 3;
	OUT_OF_RANGE = 4;
	SKILL_CASTING = 5;
}

enum SkillStatus
{
	SKILL_STATUS_NONE = 0;
	CASTING = 1;
	RUNNING = 2;
}

enum BuffAction
{
	BUFF_ACTION_NONE = 0;
	BUFF_ACTION_ADD = 1;
	BUFF_ACTION_REMOVE = 2;
	BUFF_ACTION_HIT = 3;
}

////////////////////////////////////////////////////////////////
//
//  Base Messages
//
////////////////////////////////////////////////////////////////

message NVector3
{
	int32 x = 1;
	int32 y = 2;
	int32 z = 3;
}

message NEntity {
	int32 id = 1;
	NVector3 position = 2;
	NVector3 direction = 3;
	int32 speed = 4;
}

message NEntitySync {
	int32 id = 1;
	EntityEvent event = 2;
	NEntity entity = 3;
	int32 param = 4;
}

message NAttributeDynamic {
	int32 hp = 1;
	int32 mp = 2;
}

message NItemInfo
{
	int32 id = 1;
	int32 count = 2;
}

message NSkillInfo
{
	int32 id = 1;
	int32 level = 2;
}

message NBagInfo
{
	int32 Unlocked = 1;
	bytes Items = 2;
}

message NStatus
{
	StatusAction action = 1;
	StatusType type = 2;
	int32 id = 3;
	int32 value = 4;
}

message StatusNotify
{
	repeated NStatus status = 1;
}

message NQuestInfo
{
	int32 quest_id = 1;
	int32 quest_guid = 2;
	QuestStatus status = 3;
	repeated int32 targets = 4;
}

message NFriendInfo
{
	int32 id = 1;
	NCharacterInfo friendInfo = 2;
	int32 status = 3;
}

message NGuildMemberInfo
{
	int32 id = 1;
	int32 characterId = 2;
	GuildTitle title = 3;
	NCharacterInfo info = 4;
	int64 joinTime = 5;
	int64 lastTime = 6;
	int32 status = 7;
}

message NGuildApplyInfo
{
	int32 guild_id = 1;
	int32 characterId = 2;
	string name = 3;
	int32 class = 4;
	int32 level = 5;
	ApplyResult result = 6;
}

message NGuildInfo
{
	int32 id = 1;
	string guild_name = 2;
	int32 leaderId = 3;
	string leaderName = 4;
	string notice = 5;
	int32 memberCount = 6;
	repeated NGuildMemberInfo members = 7;
	repeated NGuildApplyInfo applies = 8;
	int64 createTime = 9;
}

message NTeamInfo
{
	int32 id = 1;
	int32 leader = 2;
	repeated NCharacterInfo members = 3;
}

message ArenaPlayer{
	int32 entity_id = 1;
	string name = 2;
	int32 score = 3;
	int32 rank = 4;
}

message NArenaInfo {
	int32 arena_id = 1;
	ArenaPlayer red = 2;
	ArenaPlayer blue = 3;
}

message NDamageInfo {
	int32 entityId = 1;
	int32 damage = 2;
	bool critical = 3;
	bool will_dead = 4;
}

message NBuffInfo {
	int32 buffId = 1;
	int32 buffType = 2;
	BuffAction action = 3;
	int32 casterId = 4;
	int32 ownerId = 5;
	NDamageInfo damage = 6;
}

message NSkillCastInfo
{
	int32 skillId = 1;
	int32 casterId = 2;
	int32 targetId = 3;
	NVector3 position = 4;
	SkillResult result = 5;
}

message NSkillHitInfo {
	int32 skillId = 1;
	int32 casterId = 2;
	int32 hitId = 3;
	bool isBullet = 4;
	repeated NDamageInfo damages = 5;
}

message ChatMessage
{
	ChatChannel channel = 1;
	int32 id = 2;
	int32 from_id = 3;
	string from_name = 4;
	int32 to_id = 5;
	string to_name = 6;
	string message = 7;
	double time = 8;
}

message NCharacterInfo {
	int32 id = 1;
	int32 config_id = 2;
	int32 entity_id = 3;
	string name = 4;
	CharacterType type = 5;
	CharacterClass class = 6;
	int32 level = 7;
	int32 exp = 8;
	NAttributeDynamic dynamic = 9;
	int32 mapId = 10;
	NEntity entity = 11;
	int64 gold = 12;
	repeated NItemInfo items = 13;
	NBagInfo bag = 14;
	bytes Equips = 15;
	repeated NQuestInfo quests = 16;
	repeated NFriendInfo friends = 17;
	NGuildInfo guild = 18;
	int32 ride = 19;
	repeated NSkillInfo skills = 20;
}